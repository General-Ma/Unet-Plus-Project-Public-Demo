<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Segmentation data flow example</title>
  <desc id="desc">An example of how image slices, training masks, predicted probability maps, and saved output PNG masks relate in the demo.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475467; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; }
      .imageframe { fill: #f8fafc; stroke: #98a2b3; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #344054; }
      .tiny { font: 11px Arial, sans-serif; fill: #475467; }
      .flow { fill: none; stroke: #344054; stroke-width: 1.7; marker-end: url(#arrow); }
      .note { fill: #f8fafc; stroke: #d0d5dd; rx: 6; }
    </style>
  </defs>

  <rect class="bg" width="980" height="420"/>
  <text class="title" x="32" y="40">Segmentation input and output</text>
  <text class="subtitle" x="32" y="64">The app reads image folders, converts masks to binary labels for training, and saves model predictions as grayscale PNG masks.</text>

  <!-- Input image -->
  <rect class="panel" x="42" y="104" width="190" height="240"/>
  <text class="label" x="137" y="132" text-anchor="middle">Input image</text>
  <rect class="imageframe" x="77" y="154" width="120" height="120"/>
  <rect x="77" y="154" width="120" height="120" fill="#e5e7eb"/>
  <path d="M77 236 C102 212 120 220 139 198 C158 176 179 184 197 166 L197 274 L77 274 Z" fill="#cbd5e1"/>
  <path d="M95 230 C112 206 135 204 150 220 C164 235 177 232 190 210" fill="none" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <circle cx="137" cy="214" r="26" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text class="small" x="137" y="300" text-anchor="middle">.png or .tiff slice</text>
  <text class="tiny" x="137" y="318" text-anchor="middle">normalized before model input</text>

  <!-- Ground truth mask -->
  <rect class="panel" x="292" y="104" width="190" height="240"/>
  <text class="label" x="387" y="132" text-anchor="middle">Training mask</text>
  <rect class="imageframe" x="327" y="154" width="120" height="120"/>
  <rect x="327" y="154" width="120" height="120" fill="#111827"/>
  <circle cx="387" cy="214" r="30" fill="#ffffff"/>
  <text class="small" x="387" y="300" text-anchor="middle">ground-truth directory</text>
  <text class="tiny" x="387" y="318" text-anchor="middle">mask pixels &gt; 0 become 1</text>

  <!-- Model probability -->
  <rect class="panel" x="542" y="104" width="190" height="240"/>
  <text class="label" x="637" y="132" text-anchor="middle">Model prediction</text>
  <rect class="imageframe" x="577" y="154" width="120" height="120"/>
  <rect x="577" y="154" width="120" height="120" fill="#111827"/>
  <circle cx="637" cy="214" r="38" fill="#4b5563"/>
  <circle cx="637" cy="214" r="29" fill="#9ca3af"/>
  <circle cx="637" cy="214" r="20" fill="#e5e7eb"/>
  <text class="small" x="637" y="300" text-anchor="middle">sigmoid probability map</text>
  <text class="tiny" x="637" y="318" text-anchor="middle">same spatial size as input</text>

  <!-- Saved mask -->
  <rect class="panel" x="792" y="104" width="148" height="240"/>
  <text class="label" x="866" y="132" text-anchor="middle">Saved output</text>
  <rect class="imageframe" x="816" y="154" width="100" height="120"/>
  <rect x="816" y="154" width="100" height="120" fill="#111827"/>
  <circle cx="866" cy="214" r="32" fill="#d1d5db"/>
  <rect class="note" x="806" y="294" width="120" height="32"/>
  <text class="tiny" x="866" y="314" text-anchor="middle">name_predicted.png</text>

  <!-- Flow arrows and labels -->
  <path class="flow" d="M232 204 L292 204"/>
  <text class="tiny" x="262" y="192" text-anchor="middle">training pairs</text>
  <path class="flow" d="M482 204 L542 204"/>
  <text class="tiny" x="512" y="192" text-anchor="middle">fit model</text>
  <path class="flow" d="M732 204 L792 204"/>
  <text class="tiny" x="762" y="192" text-anchor="middle">x 255</text>

  <rect class="note" x="70" y="364" width="840" height="34"/>
  <text class="small" x="490" y="386" text-anchor="middle">Inference uses only the input image folder plus a saved model; the ground-truth mask is used only when training or visually checking results.</text>
</svg>
