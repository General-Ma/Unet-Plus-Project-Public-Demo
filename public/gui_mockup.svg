<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">PySimpleGUI screens in the demo app</title>
  <desc id="desc">A factual mockup of the desktop app: menu bar, home page, train page fields, predict page fields, and log output boxes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475467; }
      .window { fill: #f8fafc; stroke: #98a2b3; stroke-width: 1.5; rx: 8; }
      .bar { fill: #e5e7eb; stroke: #98a2b3; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 6; }
      .frame { fill: #f8fafc; stroke: #d0d5dd; rx: 5; }
      .input { fill: #ffffff; stroke: #98a2b3; rx: 3; }
      .button { fill: #e0f2fe; stroke: #0284c7; rx: 4; }
      .button2 { fill: #dcfce7; stroke: #16a34a; rx: 4; }
      .log { fill: #111827; stroke: #344054; rx: 5; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #344054; }
      .tiny { font: 11px Arial, sans-serif; fill: #475467; }
      .logtext { font: 11px Consolas, monospace; fill: #d1fae5; }
      .flow { fill: none; stroke: #344054; stroke-width: 1.6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="980" height="560"/>
  <text class="title" x="32" y="40">Desktop GUI screens</text>
  <text class="subtitle" x="32" y="64">The README image now mirrors the actual PySimpleGUI workflow: choose folders, run training or prediction, and read progress in the log box.</text>

  <rect class="window" x="32" y="92" width="916" height="420"/>
  <rect class="bar" x="32" y="92" width="916" height="28"/>
  <text class="tiny" x="48" y="111">Navigation: Home | Train | Predict | Exit</text>
  <text class="tiny" x="286" y="111">Appearance: Theme 1-5</text>
  <text class="tiny" x="462" y="111">Help: About | Manual | Support</text>

  <!-- Home page -->
  <rect class="panel" x="62" y="152" width="250" height="300"/>
  <text class="label" x="187" y="180" text-anchor="middle">Home page</text>
  <rect class="frame" x="134" y="202" width="106" height="76"/>
  <circle cx="187" cy="240" r="26" fill="#dbeafe" stroke="#2563eb"/>
  <text class="tiny" x="187" y="244" text-anchor="middle">logo</text>
  <text class="small" x="187" y="312" text-anchor="middle">Nick UNet+ Project</text>
  <rect class="button" x="94" y="338" width="186" height="34"/>
  <text class="small" x="187" y="360" text-anchor="middle">Train a new model</text>
  <rect class="button" x="94" y="386" width="186" height="34"/>
  <text class="small" x="187" y="408" text-anchor="middle">Make a prediction</text>

  <!-- Train page -->
  <rect class="panel" x="364" y="152" width="250" height="300"/>
  <text class="label" x="489" y="180" text-anchor="middle">Train page</text>

  <rect class="frame" x="384" y="198" width="210" height="38"/>
  <text class="tiny" x="394" y="214">Original data directory</text>
  <rect class="input" x="394" y="220" width="84" height="10"/>
  <rect class="button" x="486" y="216" width="48" height="16"/>
  <text class="tiny" x="510" y="228" text-anchor="middle">Browse</text>
  <rect class="button" x="540" y="216" width="48" height="16"/>
  <text class="tiny" x="564" y="228" text-anchor="middle">Visualize</text>

  <rect class="frame" x="384" y="246" width="210" height="38"/>
  <text class="tiny" x="394" y="262">True ground mask directory</text>
  <rect class="input" x="394" y="268" width="84" height="10"/>
  <rect class="button" x="486" y="264" width="48" height="16"/>
  <text class="tiny" x="510" y="276" text-anchor="middle">Browse</text>
  <rect class="button" x="540" y="264" width="48" height="16"/>
  <text class="tiny" x="564" y="276" text-anchor="middle">Visualize</text>

  <rect class="frame" x="384" y="294" width="210" height="48"/>
  <text class="tiny" x="394" y="311">Model type</text>
  <circle cx="402" cy="326" r="5" fill="#ffffff" stroke="#64748b"/>
  <text class="tiny" x="412" y="330">Basic UNet</text>
  <circle cx="478" cy="326" r="5" fill="#ffffff" stroke="#64748b"/>
  <text class="tiny" x="488" y="330">ResUNet</text>
  <circle cx="544" cy="326" r="5" fill="#ffffff" stroke="#64748b"/>
  <text class="tiny" x="554" y="330">U-ResNet</text>

  <rect class="frame" x="384" y="352" width="210" height="34"/>
  <text class="tiny" x="394" y="371">Epoch 1-200</text>
  <rect class="input" x="484" y="360" width="46" height="18"/>

  <rect class="button2" x="384" y="398" width="82" height="26"/>
  <text class="tiny" x="425" y="415" text-anchor="middle">Start Train</text>
  <rect class="button" x="474" y="398" width="54" height="26"/>
  <text class="tiny" x="501" y="415" text-anchor="middle">Back</text>
  <rect class="button" x="536" y="398" width="54" height="26"/>
  <text class="tiny" x="563" y="415" text-anchor="middle">Help</text>

  <rect class="log" x="384" y="436" width="210" height="48"/>
  <text class="logtext" x="394" y="456">Navigated to train module...</text>
  <text class="logtext" x="394" y="474">Training Finished</text>

  <!-- Predict page -->
  <rect class="panel" x="666" y="152" width="250" height="300"/>
  <text class="label" x="791" y="180" text-anchor="middle">Predict page</text>

  <rect class="frame" x="686" y="198" width="210" height="38"/>
  <text class="tiny" x="696" y="214">Prediction data directory</text>
  <rect class="input" x="696" y="220" width="84" height="10"/>
  <rect class="button" x="788" y="216" width="48" height="16"/>
  <text class="tiny" x="812" y="228" text-anchor="middle">Browse</text>
  <rect class="button" x="842" y="216" width="48" height="16"/>
  <text class="tiny" x="866" y="228" text-anchor="middle">Visualize</text>

  <rect class="frame" x="686" y="246" width="210" height="38"/>
  <text class="tiny" x="696" y="262">Saved model path</text>
  <rect class="input" x="696" y="268" width="116" height="10"/>
  <rect class="button" x="820" y="264" width="54" height="16"/>
  <text class="tiny" x="847" y="276" text-anchor="middle">Browse</text>

  <rect class="frame" x="686" y="294" width="210" height="38"/>
  <text class="tiny" x="696" y="310">Output mask directory</text>
  <rect class="input" x="696" y="316" width="84" height="10"/>
  <rect class="button" x="788" y="312" width="48" height="16"/>
  <text class="tiny" x="812" y="324" text-anchor="middle">Browse</text>
  <rect class="button" x="842" y="312" width="48" height="16"/>
  <text class="tiny" x="866" y="324" text-anchor="middle">Visualize</text>

  <rect class="button2" x="686" y="350" width="76" height="26"/>
  <text class="tiny" x="724" y="367" text-anchor="middle">Predict</text>
  <rect class="button" x="770" y="350" width="54" height="26"/>
  <text class="tiny" x="797" y="367" text-anchor="middle">Back</text>
  <rect class="button" x="832" y="350" width="54" height="26"/>
  <text class="tiny" x="859" y="367" text-anchor="middle">Help</text>

  <rect class="log" x="686" y="388" width="210" height="96"/>
  <text class="logtext" x="696" y="410">Prediction Initializing...</text>
  <text class="logtext" x="696" y="428">Prediction Finished.</text>

  <path class="flow" d="M280 355 C326 330 330 292 364 262"/>
  <path class="flow" d="M280 404 C346 444 598 448 666 365"/>
</svg>
